{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BridgeQuest RAG Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="h-screen bg-zinc-950 text-zinc-100">
    {% csrf_token %}
    <div class="h-full flex">
      <!-- Sidebar -->
      <aside class="w-80 border-r border-zinc-800 bg-zinc-950/60">
        <div class="p-4">
          <div class="flex items-center justify-between">
            <h1 class="text-lg font-semibold">BridgeQuest RAG</h1>
            <button id="newChatBtn" class="text-sm px-3 py-1 rounded bg-zinc-800 hover:bg-zinc-700">New</button>
          </div>
          <p class="text-xs text-zinc-400 mt-1">ChatGPT-style UI (Django)</p>
        </div>
        <div class="px-4 pb-2">
          <div class="text-xs text-zinc-400">Recent</div>
        </div>
        <div id="threads" class="px-2 overflow-auto" style="height: calc(100vh - 120px)"></div>
      </aside>

      <!-- Main -->
      <main class="flex-1 flex flex-col">
        <header class="border-b border-zinc-800 p-4 flex items-center justify-between">
          <div>
            <div class="text-sm text-zinc-400">Conversation</div>
            <div id="convTitle" class="text-base font-medium">New chat</div>
          </div>
          <div class="text-xs text-zinc-500">API: /api/chat/session/</div>
        </header>

        <section id="messages" class="flex-1 overflow-auto p-4 space-y-4"></section>

        <footer class="border-t border-zinc-800 p-4">
          <form id="chatForm" class="flex gap-2">
            <input
              id="chatInput"
              class="flex-1 rounded bg-zinc-900 border border-zinc-800 px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-600"
              placeholder="Ask anything about the collection…"
              autocomplete="off"
            />
            <button
              id="sendBtn"
              class="px-4 py-2 rounded bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50"
              type="submit"
            >
              Send
            </button>
          </form>
          <div class="mt-2 text-xs text-zinc-500">
            Tip: this UI stores a local anonymous id in your browser.
          </div>
        </footer>
      </main>
    </div>

    <script>
      const csrfToken = document.querySelector('input[name=csrfmiddlewaretoken]')?.value || '';

      let conversationId = null;

      const threadsEl = document.getElementById('threads');
      const messagesEl = document.getElementById('messages');
      const convTitleEl = document.getElementById('convTitle');
      const chatInputEl = document.getElementById('chatInput');
      const sendBtnEl = document.getElementById('sendBtn');

      function escapeHtml(s) {
        return (s || '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
      }

      function renderMessage(role, content) {
        const isUser = role === 'user';
        const wrap = document.createElement('div');
        wrap.className = 'flex ' + (isUser ? 'justify-end' : 'justify-start');

        const bubble = document.createElement('div');
        bubble.className =
          'max-w-[80%] rounded-2xl px-4 py-3 border ' +
          (isUser
            ? 'bg-indigo-600/20 border-indigo-500/30'
            : 'bg-zinc-900 border-zinc-800');

        bubble.innerHTML = `<div class="text-xs text-zinc-400 mb-1">${isUser ? 'You' : 'Assistant'}</div>` +
          `<div class="whitespace-pre-wrap leading-relaxed">${escapeHtml(content)}</div>`;

        wrap.appendChild(bubble);
        messagesEl.appendChild(wrap);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function loadThreads() {
        const res = await fetch('/chat/conversations/');
        const data = await res.json();
        threadsEl.innerHTML = '';

        const conversations = data.conversations || [];
        if (!conversations.length) {
          threadsEl.innerHTML = '<div class="px-3 py-2 text-sm text-zinc-500">No conversations yet.</div>';
          return;
        }

        for (const c of conversations) {
          const btn = document.createElement('button');
          btn.className = 'w-full text-left px-3 py-2 rounded hover:bg-zinc-900 border border-transparent hover:border-zinc-800';
          btn.innerHTML = `<div class="text-sm truncate">${escapeHtml(c.title || 'Conversation')}</div>` +
                          `<div class="text-xs text-zinc-500">#${c.id}</div>`;
          btn.onclick = () => openConversation(c.id, c.title);
          threadsEl.appendChild(btn);
        }
      }

      async function openConversation(id, title) {
        conversationId = id;
        convTitleEl.textContent = title || `Conversation ${id}`;
        messagesEl.innerHTML = '';

        const res = await fetch(`/chat/session/${id}/messages/`);
        if (!res.ok) {
          renderMessage('assistant', 'Could not load conversation.');
          return;
        }
        const data = await res.json();
        const msgs = data.messages || [];
        for (const m of msgs) {
          renderMessage(m.role, m.content);
        }
      }

      function newChat() {
        conversationId = null;
        convTitleEl.textContent = 'New chat';
        messagesEl.innerHTML = '';
        chatInputEl.focus();
      }

      document.getElementById('newChatBtn').addEventListener('click', (e) => {
        e.preventDefault();
        newChat();
      });

      document.getElementById('chatForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const query = (chatInputEl.value || '').trim();
        if (!query) return;

        chatInputEl.value = '';
        renderMessage('user', query);

        sendBtnEl.disabled = true;
        try {
          const res = await fetch('/chat/send/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': csrfToken,
            },
            credentials: 'same-origin',
            body: JSON.stringify({
              query,
              conversation_id: conversationId,
            }),
          });
          const data = await res.json();
          if (!res.ok || data.error) {
            renderMessage('assistant', data.error || 'Request failed.');
            return;
          }

          conversationId = data.conversation_id;
          renderMessage('assistant', data.answer || '');
          await loadThreads();
        } catch (err) {
          renderMessage('assistant', 'Network error.');
        } finally {
          sendBtnEl.disabled = false;
        }
      });

      // Boot
      newChat();
      loadThreads();
    </script>
  </body>
</html>
